default:
  project_name: "absent-from-chronic"

  # AI Support Configuration
  ai_support:
    personas_dir: "./ai/personas/"
    memory_dir: "./ai/memory/"
    default_persona: "default"
    context_components:
      - "mission"
      - "method"
      - "glossary"
    memory_enabled: true

  # Raw input files (CCHS PUMF .sav files)
  raw_data:
    cchs_2010: "./data-private/raw/2026-02-19/CCHS2010_LOP.sav"
    cchs_2014: "./data-private/raw/2026-02-19/CCHS_2014_EN_PUMF.sav"

  # Database configuration — CCHS pipeline
  database:
    cchs:
      ferry_sqlite:       "./data-private/derived/cchs-1.sqlite"
      ellis_sqlite:       "./data-private/derived/cchs-2.sqlite"
      ellis_parquet_dir:  "./data-private/derived/cchs-2-tables/"

  # Basic project configuration
  directories:
    ai: "./ai/"
    data_private: "./data-private/"
    data_public: "./data-public/"
    analysis: "./analysis/"
    derived: "./data-private/derived/"
    raw: "./data-private/raw/"

  # Flow execution logging (organized by year/date for easy archiving and purging)
  path_log_flow: !expr strftime(Sys.time(), "data-private/logs/%Y/%Y-%m-%d/flow-%Y-%m-%d--%H-%M-%S.log")

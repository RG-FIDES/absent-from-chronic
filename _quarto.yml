project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - pages/data.qmd
    - pages/pipeline.qmd
    - pages/guides.qmd
    - pages/philosophy.qmd
    - pages/authors.qmd
    - analysis/eda-1/eda-1.qmd
    - analysis/eda-2/eda-2.qmd

execute:
  freeze: auto   # use cached results; re-run only when source changes

website:
  title: "Absent from Chronic"
  description: "AI-augmented reproducible research on work absenteeism using CCHS data"
  favicon: ""
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: Analysis
        menu:
          - href: analysis/eda-1/eda-1.qmd
            text: "EDA 1 — Vehicle Performance (Template)"
          - href: analysis/eda-2/eda-2.qmd
            text: "EDA 2 — Work Absence (CCHS)"
          - href: analysis/eda-3/eda-3.qmd
            text: "EDA 3 — Chronic Absence (CCHS)"
      - href: pages/data.qmd
        text: Data
      - href: pages/pipeline.qmd
        text: Pipeline
      - href: pages/guides.qmd
        text: Guides
      - href: pages/philosophy.qmd
        text: Philosophy
      - href: pages/authors.qmd
        text: Authors
    right:
      - icon: github
        href: https://github.com/oleksandkov/absent-from-chronic-oleksandkov

format:
  html:
    theme: yeti
    toc: true
    toc-location: right
    highlight-style: breeze
    code-fold: true
    code-line-numbers: true

name: Publish to GitHub Pages

on:
  workflow_dispatch:      # manual trigger only — run from the Actions tab when ready to publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site (frozen outputs only — no R runtime needed)
        run: quarto render
        # freeze: auto (set in _quarto.yml) uses cached _freeze/ outputs when hash matches.
        # No R needed on CI as long as _freeze/ is up-to-date and committed.
        # To rebuild outputs: render locally with R + private data, commit _freeze/, then push.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

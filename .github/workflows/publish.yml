name: Publish to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '_frontend-1/**'
      - '_site/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:     

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate committed site directory
        shell: bash
        run: |
          set -euo pipefail
          echo "Workspace: $PWD"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Checking for committed _site directory..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ -d "_site" ]; then
            echo "✓ FOUND: _site"
            echo "SITE_DIR=_site" >> "$GITHUB_ENV"
            echo "Site contents:"
            ls -lh _site | head -20
            exit 0
          fi

          echo "✗ ERROR: Could not find committed _site directory"
          echo "If you want CI to build the site, switch the workflow back to rendering with Quarto."
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.SITE_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4